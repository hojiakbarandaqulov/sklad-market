server:
  domain: http://localhost
  port: 8087

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-chat-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/market-realm

aws:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: skalad-market

services:
  company:
    url: ${COMPANY_SERVICE_URL:http://localhost:8083}
  user:
    url: ${USER_SERVICE_URL:http://localhost:8082}
  product:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8085}
