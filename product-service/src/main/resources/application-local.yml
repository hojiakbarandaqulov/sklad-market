server:
  domain: http://localhost
  port: 8085

spring:
  application:
    name: product-service

  elasticsearch:
    uris: http://localhost:9200

  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-product-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/market-realm

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        
app:
  kafka:
    topic:
      product-created: product-created-topic

  media:
    base-url: http://localhost:9000/skalad-market

aws:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: skalad-market


