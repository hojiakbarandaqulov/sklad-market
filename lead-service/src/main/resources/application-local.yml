server:
  domain: http://localhost
  port: 8086

spring:
  application:
    name: lead-service

  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-lead-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/market-realm

services:
  product-service:
    url: ${PRODUCT_SERVICE_URL:http://localhost:8085}
  company-service:
    url: ${COMPANY_SERVICE_URL:http://localhost:8083}
