server:
  domain: http://localhost
  port: 8081

spring:
  application:
    name: auth-service


  # DATABASE
  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-auth-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  # Kafka Producer config
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
  # Kafka Consumer config
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"

  mail:
    host: ${MAIL_HOST:smtp.mail.ru}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:xandaqulov@mail.ru}
    password: ${MAIL_PASSWORD:6uTQvoY6HldZxhFLVYoW}
    protocol: ${MAIL_PROTOCOL:smtp}

    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.mail.ru}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: 50000
          timeout: 50000
          writetimeout: 50000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://localhost:9090/realms/market-realm

keycloak:
  token-url: http://localhost:9090/realms/market-realm/protocol/openid-connect/token
  client-id: market-backend
  client-secret: CGEOv2jxbcZAi4Gczp22qKQIHVXfHfYH
  admin-url: http://localhost:9090/admin/realms/market-realm
  admin-username: admin
  admin-password: admin



