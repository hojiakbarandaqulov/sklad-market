server:
  address: 127.0.0.1
  domain: ${SERVER_DOMAIN:https://skladmarket.uz}
  port: 8081
  url: ${SWAGGER_SERVER_URL:https://skladmarket.uz}

spring:
  application:
    name: auth-service


  # DATABASE
  datasource:
    url: jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:skalad_market_auth}
    username: ${DB_USERNAME:sklad_user}
    password: ${DB_PASSWORD:sklad-market}
    driver-class-name: org.postgresql.Driver

  mail:
    host: ${MAIL_HOST:smtp.mail.ru}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:xandaqulov@mail.ru}
    password: ${MAIL_PASSWORD:6uTQvoY6HldZxhFLVYoW}
    protocol: ${MAIL_PROTOCOL:smtp}

    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.mail.ru}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: 50000
          timeout: 50000
          writetimeout: 50000
  # Kafka Producer config
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    # Kafka Consumer config
    consumer:
      group-id: auth-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: "*"

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://127.0.0.1:9090/realms/market-realm}

keycloak:
  token-url: ${KEYCLOAK_TOKEN_URL:http://localhost:9090/realms/market-realm/protocol/openid-connect/token}
  master-token-url: ${KEYCLOAK_MASTER_TOKEN_URL:http://localhost:9090/realms/master/protocol/openid-connect/token}
  admin-url: ${KEYCLOAK_ADMIN_URL:http://localhost:9090/admin/realms/market-realm}
  client-id: ${KEYCLOAK_CLIENT_ID:market-backend}
  client-secret: ${KEYCLOAK_CLIENT_SECRET:agazVSCHc4wJNLYXZtPWSHDm3PAT3VJ6}
  admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
  admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://127.0.0.1:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: ${SERVER_IP:127.0.0.1}
    instance-id: ${spring.application.name}:${server.port}
springdoc:
  swagger-ui:
    config-url: /swagger/auth/v3/api-docs/swagger-config
    url: /swagger/auth/v3/api-docs
