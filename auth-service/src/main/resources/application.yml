server:
  url: ${server.domain}:${server.port}
spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:prod}


  # Flyway
  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration

  mail:
    host: ${MAIL_HOST:smtp.mail.ru}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:xandaqulov@mail.ru}
    password: ${MAIL_PASSWORD:6uTQvoY6HldZxhFLVYoW}
    protocol: ${MAIL_PROTOCOL:smtp}

    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
            trust: ${MAIL_SMTP_SSL_TRUST:smtp.mail.ru}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
            required: ${MAIL_SMTP_STARTTLS_REQUIRED:true}
          connectiontimeout: 50000
          timeout: 50000
          writetimeout: 50000


  # Eureka Client
eureka:
  client:
    serviceUrl:
      defaultZone: http://127.0.0.1:8761/eureka/
