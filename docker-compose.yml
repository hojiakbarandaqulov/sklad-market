  x-common-env: &common-env
    SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}
    TZ: ${TZ:-Asia/Tashkent}

    SERVER_DOMAIN: ${SERVER_DOMAIN:-https://skladmarket.uz}
    SERVER_IP: ${SERVER_IP:-127.0.0.1}

    EUREKA_DEFAULT_ZONE: ${EUREKA_DEFAULT_ZONE:-http://localhost:8761/eureka/}
    EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://localhost:8761/eureka/}
    EUREKA_INSTANCE_HOSTNAME: localhost
    EUREKA_INSTANCE_PREFER_IP_ADDRESS: "false"

    KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}
    SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-localhost:9092}

    KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/market-realm}
    KEYCLOAK_TOKEN_URL: ${KEYCLOAK_TOKEN_URL:-http://localhost:9090/realms/market-realm/protocol/openid-connect/token}
    KEYCLOAK_ADMIN_URL: ${KEYCLOAK_ADMIN_URL:-http://localhost:9090/admin/realms/market-realm}
    KEYCLOAK_MASTER_TOKEN_URL: ${KEYCLOAK_MASTER_TOKEN_URL:-http://127.0.0.1:9090/realms/master/protocol/openid-connect/token}
    KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-market-backend}
    KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-agazVSCHc4wJNLYXZtPWSHDm3PAT3VJ6}
    KEYCLOAK_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
    KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:-http://localhost:9090/realms/market-realm}

    AWS_URL: ${MINIO_URL:-http://localhost:9000}
    MINIO_URL: ${MINIO_URL:-http://localhost:9000}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    MINIO_BUCKET: ${MINIO_BUCKET:-skalad-market}
    MEDIA_BASE_URL: ${MEDIA_BASE_URL:-https://skladmarket.uz/skalad-market/}

    DB_USERNAME: ${DB_USERNAME:-sklad_user}
    DB_PASSWORD: ${DB_PASSWORD:-sklad-market}
    SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-sklad_user}
    SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-sklad-market}

    MAIL_HOST: ${MAIL_HOST:-smtp.mail.ru}
    MAIL_PORT: ${MAIL_PORT:-587}
    MAIL_USERNAME: ${MAIL_USERNAME:-xandaqulov@mail.ru}
    MAIL_PASSWORD: ${MAIL_PASSWORD:-6uTQvoY6HldZxhFLVYoW}
    MAIL_PROTOCOL: ${MAIL_PROTOCOL:-smtp}
    MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
    MAIL_SMTP_SSL_ENABLE: ${MAIL_SMTP_SSL_ENABLE:-false}
    MAIL_SMTP_SSL_TRUST: ${MAIL_SMTP_SSL_TRUST:-smtp.mail.ru}
    MAIL_SMTP_STARTTLS_ENABLE: ${MAIL_SMTP_STARTTLS_ENABLE:-true}
    MAIL_SMTP_STARTTLS_REQUIRED: ${MAIL_SMTP_STARTTLS_REQUIRED:-true}

  x-internal-service: &internal-service
    network_mode: host
    restart: unless-stopped

  services:
    zookeeper:
      image: confluentinc/cp-zookeeper:7.4.0
      container_name: zookeeper
      ports:
        - "127.0.0.1:2181:2181"
      environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
        TZ: ${TZ:-Asia/Tashkent}
      restart: unless-stopped

    kafka:
      image: confluentinc/cp-kafka:7.4.0
      container_name: kafka
      depends_on:
        - zookeeper
      ports:
        - "127.0.0.1:9092:9092"
      environment:
        KAFKA_BROKER_ID: 1
        KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
        KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
        KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
        KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
        KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
        TZ: ${TZ:-Asia/Tashkent}
      restart: unless-stopped

    minio:
      image: quay.io/minio/minio
      container_name: minio
      ports:
        - "127.0.0.1:9000:9000"
        - "127.0.0.1:9001:9001"
      environment:
        MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
        MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
        TZ: ${TZ:-Asia/Tashkent}
      volumes:
        - minio-data:/data
      command: server /data --console-address ":9001"
      restart: unless-stopped

    minio-init:
      image: minio/mc
      depends_on:
        - minio
      network_mode: host
      entrypoint: >
        /bin/sh -c "
        sleep 10;
        mc alias set local http://127.0.0.1:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/skalad-market;
        mc anonymous set public local/skalad-market;
        exit 0;
        "

    keycloak:
      image: quay.io/keycloak/keycloak:24.0
      container_name: keycloak
      command: start-dev
      ports:
        - "127.0.0.1:9090:8080"
      environment:
        KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USERNAME:-admin}
        KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
        TZ: ${TZ:-Asia/Tashkent}
      restart: unless-stopped

    elasticsearch:
      image: elasticsearch:8.11.0
      container_name: elasticsearch
      ports:
        - "127.0.0.1:9200:9200"
      environment:
        discovery.type: single-node
        xpack.security.enabled: "false"
        ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms512m -Xmx512m}
        TZ: ${TZ:-Asia/Tashkent}
      volumes:
        - elasticsearch-data:/usr/share/elasticsearch/data
      restart: unless-stopped

    discovery-service:
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: discovery-service
      container_name: discovery-service
      network_mode: host
      restart: unless-stopped
      environment:
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8761
        TZ: ${TZ:-Asia/Tashkent}
        JAVA_OPTS: ${JAVA_OPTS:--Xms128m -Xmx512m}

    api-gateway:
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: api-gateway
      container_name: api-gateway
      network_mode: host
      restart: unless-stopped
      depends_on:
        - discovery-service
      environment:
        <<: *common-env
        SERVER_ADDRESS: 0.0.0.0
        SERVER_PORT: 8080

    auth-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: auth-service
      container_name: auth-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8081
        SPRING_APPLICATION_NAME: auth-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_auth

    user-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: user-service
      container_name: user-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
        - minio
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8082
        SPRING_APPLICATION_NAME: user-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_user

    company-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: company-service
      container_name: company-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
        - user-service
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8083
        SPRING_APPLICATION_NAME: company-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_company

    category-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: category-service
      container_name: category-service
      depends_on:
        - discovery-service
        - keycloak
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8084
        SPRING_APPLICATION_NAME: category-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_category

    product-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: product-service
      container_name: product-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
        - minio
        - elasticsearch
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8085
        SPRING_APPLICATION_NAME: product-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_product
        SPRING_ELASTICSEARCH_URIS: http://localhost:9200

    lead-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: lead-service
      container_name: lead-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
        - product-service
        - company-service
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8086
        SPRING_APPLICATION_NAME: lead-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_lead
        PRODUCT_SERVICE_URL: http://localhost:8085
        COMPANY_SERVICE_URL: http://localhost:8083

    chat-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: chat-service
      container_name: chat-service
      depends_on:
        - discovery-service
        - keycloak
        - minio
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8087
        SPRING_APPLICATION_NAME: chat-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_chat

    notification-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: notification-service
      container_name: notification-service
      depends_on:
        - discovery-service
        - keycloak
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8088
        SPRING_APPLICATION_NAME: notification-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_notification

    report-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: report-service
      container_name: report-service
      depends_on:
        - discovery-service
        - kafka
        - keycloak
        - product-service
        - company-service
        - chat-service
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8089
        SPRING_APPLICATION_NAME: report-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_report

    file-service:
      <<: *internal-service
      build:
        context: .
        dockerfile: Dockerfile-service
        args:
          SERVICE_DIR: file-service
      container_name: file-service
      depends_on:
        - discovery-service
        - keycloak
        - minio
      environment:
        <<: *common-env
        SERVER_ADDRESS: 127.0.0.1
        SERVER_PORT: 8090
        SPRING_APPLICATION_NAME: file-service
        SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/skalad_market_file

  volumes:
    minio-data:
    elasticsearch-data:
