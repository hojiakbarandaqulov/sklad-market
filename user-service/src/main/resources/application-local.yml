server:
  domain: http://localhost
  port: 8082

spring:
  application:
    name: user-service

  # DATABASE
  datasource:
    url: jdbc:postgresql://localhost:5432/skalad-market-user-db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/market-realm

keycloak:
   token-url: http://localhost:9090/realms/market-realm/protocol/openid-connect/token
   master-token-url: http://localhost:9090/realms/master/protocol/openid-connect/token
   client-id: market-backend
   client-secret: Pi5lwDJnYn9TWcc1iLQzJsUGaHeEx8FK
   admin-url: http://localhost:9090/admin/realms/market-realm
   admin-username: admin
   admin-password: admin

aws:
    url: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket-name: skalad-market
